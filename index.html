<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Papers Daily | 每日AI论文</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #0d0d1a 100%);
            min-height: 100vh;
            color: #e4e4e7;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        header {
            text-align: center;
            padding: 50px 0 30px;
            background: linear-gradient(180deg, rgba(79,70,229,0.1) 0%, transparent 100%);
            margin-bottom: 30px;
        }
        h1 { 
            font-size: 2.8rem; 
            margin-bottom: 10px;
            background: linear-gradient(135deg, #818cf8, #c084fc, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle { 
            color: #9ca3af; 
            font-size: 1.1rem;
        }
        .header-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }
        .header-stat {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            font-size: 0.9rem;
        }
        
        /* Filters */
        .filters {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
        }
        .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .filter-group label { 
            font-weight: 500; 
            color: #9ca3af;
            font-size: 0.9rem;
        }
        select, input {
            padding: 10px 16px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 14px;
            min-width: 150px;
            transition: all 0.2s;
        }
        select:hover, input:hover { border-color: rgba(79,70,229,0.5); }
        select:focus, input:focus { 
            outline: none; 
            border-color: #4f46e5;
            background: rgba(79,70,229,0.1);
        }
        
        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 5px;
        }
        .stats-left {
            color: #9ca3af;
            font-size: 0.95rem;
        }
        .stats-left strong { color: #fff; }
        
        /* Paper Grid */
        .papers-grid {
            display: grid;
            gap: 24px;
        }
        
        /* Paper Card */
        .paper-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 28px;
            transition: all 0.3s ease;
        }
        .paper-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            border-color: rgba(79,70,229,0.3);
            background: linear-gradient(135deg, rgba(79,70,229,0.08) 0%, rgba(255,255,255,0.02) 100%);
        }
        
        .paper-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 15px;
            margin-bottom: 12px;
        }
        
        .paper-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #fff;
            line-height: 1.5;
            flex: 1;
        }
        .paper-title a {
            color: inherit;
            text-decoration: none;
            transition: color 0.2s;
        }
        .paper-title a:hover { 
            color: #818cf8; 
        }
        
        .paper-id {
            font-size: 0.75rem;
            color: #6b7280;
            background: rgba(255,255,255,0.05);
            padding: 4px 10px;
            border-radius: 6px;
            font-family: monospace;
        }
        
        .paper-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
            font-size: 0.9rem;
            color: #9ca3af;
        }
        .paper-meta .authors {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 500px;
        }
        
        .paper-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }
        
        .tag {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            background: rgba(79,70,229,0.2);
            color: #a5b4fc;
        }
        .tag.cs-AI { background: rgba(16,185,129,0.2); color: #6ee7b7; }
        .tag.cs-LG { background: rgba(59,130,246,0.2); color: #93c5fd; }
        .tag.cs-CL { background: rgba(139,92,246,0.2); color: #c4b5fd; }
        .tag.cs-CV { background: rgba(245,158,11,0.2); color: #fcd34d; }
        .tag.eess-AS { background: rgba(236,72,153,0.2); color: #f9a8d4; }
        .tag.cs-SD { background: rgba(6,182,212,0.2); color: #67e8f9; }
        .tag.cs-RO { background: rgba(249,115,22,0.2); color: #fdba74; }
        
        /* Abstract Section */
        .paper-abstract {
            position: relative;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .paper-abstract-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6b7280;
            margin-bottom: 8px;
        }
        .paper-abstract p {
            color: #d1d5db;
            font-size: 0.95rem;
            line-height: 1.7;
        }
        
        /* Summary Section */
        .paper-summary {
            background: rgba(79,70,229,0.05);
            border-left: 3px solid #4f46e5;
            border-radius: 0 12px 12px 0;
            padding: 16px;
            margin-bottom: 16px;
        }
        .paper-summary-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #818cf8;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .paper-summary p {
            color: #c7d2fe;
            font-size: 0.9rem;
            line-height: 1.6;
        }
        
        .paper-links {
            display: flex;
            gap: 12px;
        }
        .paper-links a {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        .paper-links .pdf {
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
            color: #fff;
        }
        .paper-links .pdf:hover { 
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(220,38,38,0.3);
        }
        .paper-links .arxiv {
            background: rgba(255,255,255,0.1);
            color: #e4e4e7;
        }
        .paper-links .arxiv:hover { background: rgba(255,255,255,0.15); }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 60px;
            color: #6b7280;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(79,70,229,0.2);
            border-top-color: #4f46e5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Empty State */
        .empty {
            text-align: center;
            padding: 60px;
            color: #6b7280;
        }
        
        /* Date Badge */
        .date-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: rgba(79,70,229,0.15);
            border-radius: 20px;
            font-size: 0.85rem;
            color: #a5b4fc;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .filter-row { flex-direction: column; align-items: stretch; }
            select, input { width: 100%; }
            .paper-header { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📄 AI Papers Daily</h1>
            <p class="subtitle">每日 AI 领域最新论文精选 · Powered by arXiv</p>
            <div class="header-stats">
                <div class="header-stat">
                    <span>📚</span>
                    <span id="paperCount">-</span> 篇论文
                </div>
                <div class="header-stat">
                    <span>🔄</span>
                    <span id="updateTime">-</span>
                </div>
            </div>
        </header>
        
        <div class="filters">
            <div class="filter-row">
                <div class="filter-group">
                    <label>🏷️ 领域</label>
                    <select id="categoryFilter">
                        <option value="">全部领域</option>
                        <option value="cs.AI">cs.AI 人工智能</option>
                        <option value="cs.LG">cs.LG 机器学习</option>
                        <option value="cs.CL">cs.CL 计算语言学</option>
                        <option value="cs.CV">cs.CV 计算机视觉</option>
                        <option value="cs.RO">cs.RO 机器人</option>
                        <option value="eess.AS">eess.AS 语音处理</option>
                        <option value="cs.SD">cs.SD 语音信号</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label>👤 作者</label>
                    <input type="text" id="authorFilter" placeholder="搜索作者...">
                </div>
                
                <div class="filter-group">
                    <label>📅 日期</label>
                    <input type="date" id="dateFilter">
                </div>
                
                <div class="filter-group">
                    <label>🔍 关键词</label>
                    <input type="text" id="keywordFilter" placeholder="搜索标题/摘要...">
                </div>
            </div>
        </div>
        
        <div class="stats-bar">
            <div class="stats-left">
                显示 <strong id="showingCount">0</strong> 篇论文
            </div>
            <div class="date-badge">
                📅 <span id="dateDisplay">-</span>
            </div>
        </div>
        
        <div id="papersGrid" class="papers-grid">
            <div class="loading">
                <div class="loading-spinner"></div>
                加载论文中...
            </div>
        </div>
    </div>

    <script>
        const DATA_URL = 'data/papers.json';
        let allPapers = [];
        
        async function loadPapers() {
            try {
                const response = await fetch(DATA_URL);
                const data = await response.json();
                allPapers = data.papers || [];
                
                // Update stats
                document.getElementById('paperCount').textContent = data.count || allPapers.length;
                document.getElementById('updateTime').textContent = data.updated || '-';
                document.getElementById('dateDisplay').textContent = data.updated || '-';
                
                renderPapers(allPapers);
            } catch (error) {
                document.getElementById('papersGrid').innerHTML = 
                    `<div class="empty">❌ 加载失败: ${error.message}</div>`;
            }
        }
        
        function renderPapers(papers) {
            const grid = document.getElementById('papersGrid');
            document.getElementById('showingCount').textContent = papers.length;
            
            if (papers.length === 0) {
                grid.innerHTML = '<div class="empty">🔍 没有找到匹配的论文</div>';
                return;
            }
            
            grid.innerHTML = papers.map(paper => {
                const categories = paper.categories || [];
                const tagsHtml = categories.map(cat => 
                    `<span class="tag ${cat.replace('.','-')}">${cat}</span>`
                ).join('');
                
                const authors = (paper.authors || []).slice(0, 5).join(', ');
                const date = paper.published ? paper.published : '';
                const paperId = paper.id || '';
                
                // Abstract (full)
                const abstract = paper.abstract || '';
                
                // Summary (shortened)
                const summary = paper.summary || (abstract ? abstract.substring(0, 400) + '...' : '');
                
                return `
                    <div class="paper-card">
                        <div class="paper-header">
                            <h2 class="paper-title">
                                <a href="${paper.url || '#'}" target="_blank">${paper.title || 'Untitled'}</a>
                            </h2>
                            <span class="paper-id">${paperId}</span>
                        </div>
                        
                        <div class="paper-meta">
                            <span class="authors">👤 ${authors}${((paper.authors||[]).length > 5) ? '...' : ''}</span>
                            <span>📅 ${date}</span>
                        </div>
                        
                        <div class="paper-tags">
                            ${tagsHtml}
                        </div>
                        
                        ${abstract ? `
                        <div class="paper-abstract">
                            <div class="paper-abstract-label">📝 摘要 Abstract</div>
                            <p>${abstract}</p>
                        </div>
                        ` : ''}
                        
                        ${summary && summary !== abstract ? `
                        <div class="paper-summary">
                            <div class="paper-summary-label">⚡ 概要 Summary</div>
                            <p>${summary}</p>
                        </div>
                        ` : ''}
                        
                        <div class="paper-links">
                            <a href="${paper.pdf || '#'}" class="pdf" target="_blank">📥 PDF</a>
                            <a href="${paper.url || '#'}" class="arxiv" target="_blank">🌐 arXiv</a>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function filterPapers() {
            const category = document.getElementById('categoryFilter').value;
            const author = document.getElementById('authorFilter').value.toLowerCase();
            const date = document.getElementById('dateFilter').value;
            const keyword = document.getElementById('keywordFilter').value.toLowerCase();
            
            const filtered = allPapers.filter(paper => {
                // Category filter
                if (category && !(paper.categories || []).includes(category)) {
                    return false;
                }
                
                // Author filter
                if (author && !(paper.authors || []).some(a => a.toLowerCase().includes(author))) {
                    return false;
                }
                
                // Date filter
                if (date && !(paper.published || '').startsWith(date)) {
                    return false;
                }
                
                // Keyword filter
                if (keyword) {
                    const title = (paper.title || '').toLowerCase();
                    const abstract = (paper.abstract || '').toLowerCase();
                    if (!title.includes(keyword) && !abstract.includes(keyword)) {
                        return false;
                    }
                }
                
                return true;
            });
            
            renderPapers(filtered);
        }
        
        // Event listeners
        document.getElementById('categoryFilter').addEventListener('change', filterPapers);
        document.getElementById('authorFilter').addEventListener('input', filterPapers);
        document.getElementById('dateFilter').addEventListener('change', filterPapers);
        document.getElementById('keywordFilter').addEventListener('input', filterPapers);
        
        // Load on start
        loadPapers();
    </script>
</body>
</html>

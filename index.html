<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Papers Daily | 每日AI论文</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #0d0d1a 100%);
            min-height: 100vh;
            color: #e4e4e7;
        }
        
        header {
            text-align: center;
            padding: 40px 0 25px;
            background: linear-gradient(180deg, rgba(79,70,229,0.1) 0%, transparent 100%);
            margin-bottom: 0;
        }
        h1 { 
            font-size: 2.5rem; 
            margin-bottom: 8px;
            background: linear-gradient(135deg, #818cf8, #c084fc, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle { color: #9ca3af; font-size: 1rem; }
        
        .main-container {
            display: flex;
            gap: 0;
            height: calc(100vh - 180px);
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 20px 20px;
        }
        
        .left-panel {
            width: 45%;
            min-width: 400px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255,255,255,0.08);
            padding-right: 20px;
        }
        
        .filters {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 140px;
        }
        .filter-group label { 
            font-weight: 500; 
            color: #9ca3af;
            font-size: 0.85rem;
            white-space: nowrap;
        }
        select, input {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 13px;
            flex: 1;
        }
        select:focus, input:focus { 
            outline: none; 
            border-color: #4f46e5;
        }
        
        .paper-list-container {
            flex: 1;
            overflow-y: auto;
            padding-right: 10px;
        }
        
        .paper-list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding: 0 4px;
        }
        .paper-list-header span { color: #9ca3af; font-size: 0.9rem; }
        
        .paper-item {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .paper-item:hover {
            background: rgba(79,70,229,0.08);
            border-color: rgba(79,70,229,0.3);
        }
        .paper-item.active {
            background: rgba(79,70,229,0.15);
            border-color: #4f46e5;
            box-shadow: 0 0 20px rgba(79,70,229,0.2);
        }
        
        .paper-item-title {
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 8px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .paper-item-abstract {
            color: #9ca3af;
            font-size: 0.85rem;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 10px;
        }
        
        .paper-item-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        
        .tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.7rem;
            background: rgba(79,70,229,0.2);
            color: #a5b4fc;
        }
        .tag.cs-AI { background: rgba(16,185,129,0.2); color: #6ee7b7; }
        .tag.cs-LG { background: rgba(59,130,246,0.2); color: #93c5fd; }
        .tag.cs-CL { background: rgba(139,92,246,0.2); color: #c4b5fd; }
        .tag.cs-CV { background: rgba(245,158,11,0.2); color: #fcd34d; }
        .tag.eess-AS { background: rgba(236,72,153,0.2); color: #f9a8d4; }
        .tag.cs-SD { background: rgba(6,182,212,0.2); color: #67e8f9; }
        
        .paper-item-meta {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 0.75rem;
            color: #6b7280;
        }
        
        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding-left: 20px;
            overflow: hidden;
        }
        
        .right-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        
        .date-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: rgba(79,70,229,0.15);
            border-radius: 20px;
            font-size: 0.85rem;
            color: #a5b4fc;
        }
        
        .detail-content {
            flex: 1;
            overflow-y: auto;
            padding-right: 10px;
        }
        
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #6b7280;
            text-align: center;
        }
        .empty-state-icon { font-size: 4rem; margin-bottom: 20px; opacity: 0.5; }
        
        .detail-section {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
        }
        
        .section-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6b7280;
            margin-bottom: 12px;
        }
        
        .detail-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 12px;
            line-height: 1.4;
        }
        
        .detail-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 16px;
            color: #9ca3af;
            font-size: 0.9rem;
        }
        
        .detail-abstract {
            color: #d1d5db;
            font-size: 0.95rem;
            line-height: 1.7;
            margin-bottom: 20px;
        }
        
        .pdf-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
            color: #fff;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .pdf-link:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(220,38,38,0.3);
        }
        
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: #6b7280;
        }
        .loading-spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(79,70,229,0.2);
            border-top-color: #4f46e5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
        ::-webkit-scrollbar-thumb { background: rgba(79,70,229,0.3); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(79,70,229,0.5); }
        
        @media (max-width: 900px) {
            .main-container { flex-direction: column; height: auto; }
            .left-panel { width: 100%; min-width: unset; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.08); padding-right: 0; padding-bottom: 20px; max-height: 50vh; }
            .right-panel { padding-left: 0; padding-top: 20px; }
            h1 { font-size: 2rem; }
            .filter-row { flex-direction: column; align-items: stretch; }
            select, input { width: 100%; }
        }
    </style>
</head>
<body>
    <header>
        <h1>📄 AI Papers Daily</h1>
        <p class="subtitle">每日 AI 领域最新论文精选 · Powered by arXiv</p>
    </header>
    
    <div class="main-container">
        <div class="left-panel">
            <div class="filters">
                <div class="filter-row">
                    <div class="filter-group">
                        <label>🏷️ 领域</label>
                        <select id="categoryFilter">
                            <option value="">全部</option>
                            <option value="cs.AI">cs.AI</option>
                            <option value="cs.LG">cs.LG</option>
                            <option value="cs.CL">cs.CL</option>
                            <option value="cs.CV">cs.CV</option>
                            <option value="eess.AS">eess.AS</option>
                            <option value="cs.SD">cs.SD</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>🔍 搜索</label>
                        <input type="text" id="keywordFilter" placeholder="标题/关键词...">
                    </div>
                </div>
            </div>
            
            <div class="paper-list-container">
                <div class="paper-list-header">
                    <span id="paperCount">加载中...</span>
                </div>
                <div id="paperList">
                    <div class="loading"><div class="loading-spinner"></div></div>
                </div>
            </div>
        </div>
        
        <div class="right-panel">
            <div class="right-panel-header">
                <div class="date-badge" id="updateDate"></div>
            </div>
            
            <div class="detail-content" id="detailContent">
                <div class="empty-state">
                    <div class="empty-state-icon">📄</div>
                    <p>点击左侧论文查看详情</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const DATA_URL = 'data/papers.json';
        let allPapers = [];
        let selectedPaper = null;
        
        async function loadPapers() {
            try {
                const response = await fetch(DATA_URL);
                const data = await response.json();
                allPapers = data.papers || [];
                document.getElementById('paperCount').textContent = `${allPapers.length} 篇论文`;
                document.getElementById('updateDate').textContent = `📅 ${data.updated || '-'}`;
                renderPaperList(allPapers);
            } catch (error) {
                document.getElementById('paperList').innerHTML = 
                    `<div class="loading">❌ 加载失败: ${error.message}</div>`;
            }
        }
        
        function renderPaperList(papers) {
            const list = document.getElementById('paperList');
            if (papers.length === 0) {
                list.innerHTML = '<div class="loading">没有找到匹配的论文</div>';
                return;
            }
            
            list.innerHTML = papers.map((paper, idx) => {
                const tagsHtml = (paper.categories || []).map(cat => 
                    `<span class="tag ${cat.replace('.','-')}">${cat}</span>`
                ).join('');
                
                return `
                    <div class="paper-item" data-idx="${idx}" onclick="selectPaper(${idx})">
                        <div class="paper-item-title">${paper.title || 'Untitled'}</div>
                        <div class="paper-item-abstract">${paper.abstract || ''}</div>
                        <div class="paper-item-tags">${tagsHtml}</div>
                        <div class="paper-item-meta">
                            <span>👤 ${(paper.authors || []).slice(0, 2).join(', ')}</span>
                            <span>📅 ${paper.published || ''}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function selectPaper(idx) {
            document.querySelectorAll('.paper-item').forEach(item => item.classList.remove('active'));
            document.querySelector(`.paper-item[data-idx="${idx}"]`).classList.add('active');
            
            selectedPaper = allPapers[idx];
            renderDetail();
        }
        
        function renderDetail() {
            if (!selectedPaper) return;
            
            const detailContent = document.getElementById('detailContent');
            const p = selectedPaper;
            
            detailContent.innerHTML = `
                <div class="detail-section">
                    <h2 class="detail-title">${p.title || 'Untitled'}</h2>
                    <div class="detail-meta">
                        <span>👤 ${(p.authors || []).join(', ')}</span>
                        <span>📅 ${p.published || ''}</span>
                        <span>🏷️ ${(p.categories || []).join(', ')}</span>
                    </div>
                    <a href="${p.pdf || '#'}" class="pdf-link" target="_blank">📥 Download PDF</a>
                </div>
                
                <div class="detail-section">
                    <div class="section-title">📝 Abstract</div>
                    <p class="detail-abstract">${p.abstract || ''}</p>
                </div>
            `;
        }
        
        function filterPapers() {
            const category = document.getElementById('categoryFilter').value;
            const keyword = document.getElementById('keywordFilter').value.toLowerCase();
            
            const filtered = allPapers.filter(paper => {
                if (category && !(paper.categories || []).includes(category)) return false;
                if (keyword) {
                    const title = (paper.title || '').toLowerCase();
                    const abstract = (paper.abstract || '').toLowerCase();
                    return title.includes(keyword) || abstract.includes(keyword);
                }
                return true;
            });
            
            renderPaperList(filtered);
            document.getElementById('paperCount').textContent = `${filtered.length} 篇论文`;
        }
        
        document.getElementById('categoryFilter').addEventListener('change', filterPapers);
        document.getElementById('keywordFilter').addEventListener('input', filterPapers);
        
        loadPapers();
    </script>
</body>
</html>
